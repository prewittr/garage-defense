name: CI

on:
  pull_request:
    branches: [develop, main, 'feature/**']
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@v2

  unity-tests:
    name: Unity EditMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-
      # NOTE: testMode is 'editmode' not 'all' — PlayMode on Unity 6000.0.73f1
      # under game-ci/unity-test-runner@v4 flakes with SIGSEGV (exit 139)
      # at container cleanup. Tests themselves pass; container crashes during
      # license-client shutdown between EditMode and PlayMode phases.
      # Revisit when: (a) we actually author PlayMode tests, or
      # (b) game-ci ships a fix for the 6000.0.x PlayMode container lifecycle.
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          checkName: Unity Test Results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  latency-gate:
    name: Input Latency Gate (RPM-008)
    runs-on: ubuntu-latest
    needs: unity-tests
    steps:
      - run: echo "Placeholder — wires to device-farm latency probe once harness lands (RPM-008)."
